name: assign-reviewer
on:
  workflow_call:
    inputs:
      config-path:
        type: string
        default: '.github/assign-config.yml'
    secrets:
      telegram-token:
        required: true
      telegram-chat-id:
        required: true
      telegram-usernames:
        required: false

jobs:
  check-reviewers:
    if: "!startsWith(github.head_ref, 'release-')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has-reviewers: ${{ steps.check.outputs.has-reviewers }}
    steps:
      - name: Check if reviewers already assigned
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_json=$(gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --json reviewRequests,reviews)
          
          req_count=$(echo "$pr_json" | jq '[.reviewRequests[]? | select( if .login? then ((.login | (endswith("[bot]") or . == "github-actions") | not) and .isBot? != true) else true end )] | length')
          rev_count=$(echo "$pr_json" | jq '[.reviews[]? | select( if .author.login? then ((.author.login | (endswith("[bot]") or . == "github-actions") | not) and .author.isBot? != true) else false end )] | length')
          
          echo "Found $req_count human/team review requests and $rev_count human reviews."
          
          if [ "$req_count" -gt 0 ] || [ "$rev_count" -gt 0 ]; then
            echo "has-reviewers=true" >> $GITHUB_OUTPUT
          else
            echo "has-reviewers=false" >> $GITHUB_OUTPUT
          fi

  add-reviewers:
    needs: check-reviewers
    if: needs.check-reviewers.result == 'success' && needs.check-reviewers.outputs.has-reviewers == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.0
        with:
          configuration-path: ${{ inputs.config-path }}

  notify-reviewer:
    needs: add-reviewers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: wait-5-seconds
        run: sleep 5

      - name: fetch-updated-pr-info
        id: get_pr_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          reviewer=$(gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --json reviewRequests --jq '.reviewRequests[0].login')
          echo "reviewer=$reviewer" >> $GITHUB_OUTPUT

      - name: notify-reviewer
        env:
          TG_TOKEN: ${{ secrets.telegram-token }}
          TG_CHATID: ${{ secrets.telegram-chat-id }}
          TG_USERNAMES: ${{ secrets.telegram-usernames }}
          PR_LINK: ${{ github.event.pull_request.html_url }}
        run: |
          reviewer="${{ steps.get_pr_info.outputs.reviewer }}"
          if [ -z "$reviewer" ]; then
            echo "No reviewer found; skipping Telegram notification."
            exit 0
          fi

          if [ -z "$TG_USERNAMES" ]; then
            echo "No Telegram usernames provided, using the reviewer login as username."
            username=$reviewer
          else
            # Use the Telegram usernames mapping from the secret
            username=$(echo "$TG_USERNAMES" | jq -r ".\"$reviewer\" // \"$reviewer\"")
          fi

          message="hi ${username}, please review the PR once you have a chance - ${PR_LINK}"

          echo "Sending Telegram message: ${message}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHATID}" \
            -d text="${message}"